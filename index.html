<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Matematika 2 Player</title>
<style>
  body { 
    margin: 0; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background-color: #26543b; 
    color: white; 
    overflow: hidden; 
  }
  
  #game-board { 
    display: flex; 
    height: 100vh; 
    width: 100vw; 
    position: relative;
  }
  
  .player-zone { 
    flex: 1; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    position: relative; 
  }
  
  .player-zone:first-child { 
    border-right: 15px solid #5c3a21; 
  } 

  /* Desain Tombol Lihat Skor di Tengah Atas */
  #btn-lihat-skor {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 22px;
    font-weight: bold;
    background: #e09f3e;
    padding: 10px 30px;
    border-radius: 10px;
    color: #333;
    border: none;
    cursor: pointer;
    box-shadow: 0 5px 0 #9c6f2a;
    transition: 0.1s;
  }
  #btn-lihat-skor:active {
    transform: translate(-50%, 5px);
    box-shadow: 0 0 0;
  }

  .question-box { 
    font-size: 70px; 
    font-weight: bold; 
    margin-bottom: 40px; 
    background: rgba(0,0,0,0.2); 
    padding: 20px 50px; 
    border-radius: 15px; 
    border: 3px solid rgba(255,255,255,0.5);
    text-align: center;
    min-width: 200px;
  }
  
  .options { 
    display: flex; 
    gap: 20px; 
    min-height: 85px;
  }
  
  .btn-option { 
    font-size: 40px; 
    padding: 20px 30px; 
    cursor: pointer; 
    border-radius: 15px; 
    border: none; 
    background: #e09f3e; 
    color: #fff; 
    font-weight: bold; 
    box-shadow: 0 6px 0 #9c6f2a; 
    transition: 0.1s; 
  }
  .btn-option:active { 
    transform: translateY(6px); 
    box-shadow: 0 0 0; 
  }

  .btn-next { 
    margin-top: 50px; 
    padding: 10px 30px; 
    font-size: 20px; 
    cursor: pointer; 
    background: #444; 
    color: white; 
    border: none; 
    border-radius: 8px; 
  }
  .btn-next:hover {
    background: #555;
  }

  /* Desain Jendela Popup Skor & Hasil Akhir */
  .modal-screen { 
    display: none; 
    position: absolute; 
    top: 0; left: 0; 
    width: 100vw; height: 100vh; 
    background: rgba(0,0,0,0.9); 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    z-index: 10; 
    text-align: center; 
  }
  .result-card { 
    background: #f1f1f1; 
    color: #333; 
    padding: 30px 40px; 
    border-radius: 20px; 
    margin: 10px; 
    width: 250px; 
    display: inline-block;
  }
  .results-container { 
    display: flex; 
    gap: 30px; 
  }
  
  .btn-tutup {
    margin-top: 30px; 
    padding: 10px 40px; 
    font-size: 20px; 
    cursor: pointer; 
    background: #d9534f; 
    color: white; 
    border: none; 
    border-radius: 10px; 
    font-weight: bold;
  }
  button.restart { 
    margin-top: 40px; 
    padding: 15px 40px; 
    font-size: 24px; 
    cursor: pointer; 
    background: #4CAF50; 
    color: white; 
    border: none; 
    border-radius: 10px; 
    font-weight: bold;
  }
</style>
</head>
<body>

<div id="game-board">
  <!-- Tombol Satu Skor di Tengah -->
  <button id="btn-lihat-skor" onclick="tampilkanSkorSaatIni()">Lihat Skor</button>

  <!-- Area Player 1 -->
  <div class="player-zone" id="p1-zone">
    <div class="question-box" id="p1-q">Soal</div>
    <div class="options" id="p1-options"></div>
    <button class="btn-next" id="p1-skip" onclick="skipQuestion(1)">Lewati Soal >></button>
  </div>

  <!-- Area Player 2 -->
  <div class="player-zone" id="p2-zone">
    <div class="question-box" id="p2-q">Soal</div>
    <div class="options" id="p2-options"></div>
    <button class="btn-next" id="p2-skip" onclick="skipQuestion(2)">Lewati Soal >></button>
  </div>
</div>

<!-- Jendela Popup Untuk "Lihat Skor" di tengah permainan -->
<div id="skor-sementara-screen" class="modal-screen">
  <h1 style="color: #e09f3e; font-size: 50px; margin-bottom: 30px;">SKOR SEMENTARA</h1>
  <div class="results-container">
    <div class="result-card">
      <h2 style="font-size: 30px; margin-top: 0;">Player 1</h2>
      <p style="font-size: 24px; color: green; font-weight: bold;">Benar: <span id="cur-p1-benar">0</span></p>
      <p style="font-size: 24px; color: red; font-weight: bold;">Salah: <span id="cur-p1-salah">0</span></p>
      <h3 style="font-size: 30px; border-top: 2px solid #ccc; padding-top: 15px;">Total Skor: <span id="cur-p1-skor">0</span></h3>
    </div>
    <div class="result-card">
      <h2 style="font-size: 30px; margin-top: 0;">Player 2</h2>
      <p style="font-size: 24px; color: green; font-weight: bold;">Benar: <span id="cur-p2-benar">0</span></p>
      <p style="font-size: 24px; color: red; font-weight: bold;">Salah: <span id="cur-p2-salah">0</span></p>
      <h3 style="font-size: 30px; border-top: 2px solid #ccc; padding-top: 15px;">Total Skor: <span id="cur-p2-skor">0</span></h3>
    </div>
  </div>
  <button class="btn-tutup" onclick="tutupSkor()">Tutup & Lanjut Main</button>
</div>

<!-- Layar Hasil Akhir (Muncul saat 100 soal selesai) -->
<div id="result-screen" class="modal-screen">
  <h1 style="color: #e09f3e; font-size: 60px; margin-bottom: 40px;">PERMAINAN SELESAI</h1>
  <div class="results-container">
    <div class="result-card">
      <h2 style="font-size: 30px; margin-top: 0;">Player 1</h2>
      <p style="font-size: 24px; color: green; font-weight: bold;">Benar: <span id="p1-benar">0</span></p>
      <p style="font-size: 24px; color: red; font-weight: bold;">Salah: <span id="p1-salah">0</span></p>
      <h3 style="font-size: 36px; border-top: 2px solid #ccc; padding-top: 20px;">Skor Akhir: <span id="p1-final">0</span></h3>
    </div>
    <div class="result-card">
      <h2 style="font-size: 30px; margin-top: 0;">Player 2</h2>
      <p style="font-size: 24px; color: green; font-weight: bold;">Benar: <span id="p2-benar">0</span></p>
      <p style="font-size: 24px; color: red; font-weight: bold;">Salah: <span id="p2-salah">0</span></p>
      <h3 style="font-size: 36px; border-top: 2px solid #ccc; padding-top: 20px;">Skor Akhir: <span id="p2-final">0</span></h3>
    </div>
  </div>
  <button class="restart" onclick="startGame()">Main Lagi</button>
</div>

<script>
  const totalQuestions = 100;

  let p1 = { score: 0, correct: 0, wrong: 0, index: 0, questions: [] };
  let p2 = { score: 0, correct: 0, wrong: 0, index: 0, questions: [] };

  function generateQuestions() {
    let masterQuestions = []; 
    
    for(let i=0; i < totalQuestions; i++) {
      let a = Math.floor(Math.random() * 20) + 1;
      let b = Math.floor(Math.random() * 20) + 1;
      let ans = a + b;
      
      let w1 = ans + Math.floor(Math.random() * 5) + 1;
      let w2 = ans - Math.floor(Math.random() * 5) - 1;
      if (w2 < 0) w2 = ans + 6;

      let opts = [ans, w1, w2];
      opts.sort(() => Math.random() - 0.5);

      masterQuestions.push({ q: `${a} + ${b}`, ans: ans, opts: opts });
    }

    p1.questions = [...masterQuestions].sort(() => Math.random() - 0.5);
    p2.questions = [...masterQuestions].sort(() => Math.random() - 0.5);
  }

  function startGame() {
    p1 = { score: 0, correct: 0, wrong: 0, index: 0, questions: [] };
    p2 = { score: 0, correct: 0, wrong: 0, index: 0, questions: [] };
    
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('skor-sementara-screen').style.display = 'none';
    document.getElementById('game-board').style.display = 'flex';
    
    document.getElementById('p1-q').style.fontSize = '70px';
    document.getElementById('p2-q').style.fontSize = '70px';
    document.getElementById('p1-skip').style.display = 'block';
    document.getElementById('p2-skip').style.display = 'block';
    
    generateQuestions();
    
    loadQuestion(1);
    loadQuestion(2);
  }

  function loadQuestion(player) {
    let pData = player === 1 ? p1 : p2;
    let prefix = player === 1 ? 'p1' : 'p2';

    if (pData.index >= totalQuestions) {
      document.getElementById(`${prefix}-q`).innerText = "SELESAI!";
      document.getElementById(`${prefix}-q`).style.fontSize = '40px';
      document.getElementById(`${prefix}-options`).innerHTML = '';
      document.getElementById(`${prefix}-skip`).style.display = 'none';
      checkGameEnd();
      return;
    }

    let qData = pData.questions[pData.index];
    document.getElementById(`${prefix}-q`).innerText = qData.q;
    
    let optsDiv = document.getElementById(`${prefix}-options`);
    optsDiv.innerHTML = '';
    
    qData.opts.forEach(opt => {
      let btn = document.createElement('button');
      btn.className = 'btn-option';
      btn.innerText = opt;
      btn.onclick = () => checkAnswer(player, opt, qData.ans);
      optsDiv.appendChild(btn);
    });
  }

  function checkAnswer(player, selected, correct) {
    let pData = player === 1 ? p1 : p2;
    
    if (selected === correct) {
      pData.score += 10;
      pData.correct++;
      pData.index++; 
      loadQuestion(player);
    } else {
      pData.score -= 5;
      pData.wrong++;
    }
  }

  function skipQuestion(player) {
    let pData = player === 1 ? p1 : p2;
    if (pData.index < totalQuestions) {
      pData.index++; 
      loadQuestion(player);
    }
  }

  // --- Fungsi Baru: Menampilkan & Menutup Skor di Tengah Permainan ---
  function tampilkanSkorSaatIni() {
    // Isi data ke popup sementara
    document.getElementById('cur-p1-benar').innerText = p1.correct;
    document.getElementById('cur-p1-salah').innerText = p1.wrong;
    document.getElementById('cur-p1-skor').innerText = p1.score;

    document.getElementById('cur-p2-benar').innerText = p2.correct;
    document.getElementById('cur-p2-salah').innerText = p2.wrong;
    document.getElementById('cur-p2-skor').innerText = p2.score;

    // Tampilkan popup
    document.getElementById('skor-sementara-screen').style.display = 'flex';
  }

  function tutupSkor() {
    // Sembunyikan popup
    document.getElementById('skor-sementara-screen').style.display = 'none';
  }
  // ---------------------------------------------------------------------

  function checkGameEnd() {
    if (p1.index >= totalQuestions && p2.index >= totalQuestions) {
      endGame();
    }
  }

  function endGame() {
    document.getElementById('game-board').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';

    document.getElementById('p1-benar').innerText = p1.correct;
    document.getElementById('p1-salah').innerText = p1.wrong;
    document.getElementById('p1-final').innerText = p1.score;

    document.getElementById('p2-benar').innerText = p2.correct;
    document.getElementById('p2-salah').innerText = p2.wrong;
    document.getElementById('p2-final').innerText = p2.score;
  }

  startGame();
</script>
</body>
</html>
